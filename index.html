  </head>
  <body>
    <div id="root"></div>
    <script>
      // Decode the GitHub Pages SPA redirect (see public/404.html)
      (function (l) {
        if (l.search [1] === 'p' && l.search.slice(1).split('&')[0].slice(2) !== undefined) {
          var decoded = l.search.slice(1).split('&').reduce(function (acc, qs) {
            var pair = qs.split('=');
            acc[pair[0]] = pair[1];
            return acc;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(
              null,
              null,
              l.pathname.slice(0, -1) +
                (decoded.p || '') +
                (decoded.q ? '?' + decoded.q.replace(/~and~/g, '&') : '') +
                l.hash
            );
          }
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
